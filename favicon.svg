<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Navy background with rounded corners -->
  <rect width="32" height="32" rx="6" fill="#071428"/>
  <!-- 3x3 dot grid, teal, varying opacity like the hero pattern -->
  <!-- Row 1 -->
  <circle cx="8"  cy="8"  r="2.2" fill="#00B4C5" opacity="0.35"/>
  <circle cx="16" cy="8"  r="2.2" fill="#00B4C5" opacity="0.6"/>
  <circle cx="24" cy="8"  r="2.2" fill="#00B4C5" opacity="0.35"/>
  <!-- Row 2 -->
  <circle cx="8"  cy="16" r="2.2" fill="#00B4C5" opacity="0.6"/>
  <circle cx="16" cy="16" r="3"   fill="#00B4C5" opacity="1"/>
  <circle cx="24" cy="16" r="2.2" fill="#00B4C5" opacity="0.6"/>
  <!-- Row 3 -->
  <circle cx="8"  cy="24" r="2.2" fill="#00B4C5" opacity="0.35"/>
  <circle cx="16" cy="24" r="2.2" fill="#00B4C5" opacity="0.6"/>
  <circle cx="24" cy="24" r="2.2" fill="#00B4C5" opacity="0.35"/>
</svg>